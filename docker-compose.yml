services:
  postgres:
    image: postgres:16.3-alpine
    environment:
      POSTGRES_PASSWORD: petclinic
      POSTGRES_USER: petclinic
      POSTGRES_DB: petclinic
    networks:
      - petclinic-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U petclinic"]
      interval: 5s
      timeout: 5s
      retries: 10

networks:
  petclinic-net:
    name: petclinic-net
